name: Feature request
description: Suggest a metric, a behaviour or an improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve
      description: Describe the situation you are in, not only the feature you want
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What you would like Kestrel to do
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      description: Other tools, workarounds, or a different design

  - type: checkboxes
    id: roadmap
    attributes:
      label: Roadmap
      options:
        - label: I checked the roadmap in the README and this is not already listed
