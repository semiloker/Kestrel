name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.msystem }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - msystem: MINGW64
            prefix: mingw-w64-x86_64
          - msystem: UCRT64
            prefix: mingw-w64-ucrt-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: false
          install: >-
            ${{ matrix.prefix }}-gcc
            ${{ matrix.prefix }}-make
            ${{ matrix.prefix }}-cmake

      - name: Show toolchain
        shell: cmd
        run: |
          set "PATH=${{ steps.msys2.outputs.msys2-location }}\${{ matrix.msystem }}\bin;%PATH%"
          gcc --version
          cmake --version
          windres --version

      - name: Configure (CMake)
        shell: cmd
        run: |
          set "PATH=${{ steps.msys2.outputs.msys2-location }}\${{ matrix.msystem }}\bin;%PATH%"
          cmake -B build -G "MinGW Makefiles" -DCMAKE_CXX_COMPILER=g++ -DCMAKE_C_COMPILER=gcc -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: cmd
        run: |
          set "PATH=${{ steps.msys2.outputs.msys2-location }}\${{ matrix.msystem }}\bin;%PATH%"
          cmake --build build --config Release -j8

      - name: Verify artifact
        shell: pwsh
        run: |
          $exe = "build/bin/kestrel.exe"
          if (-not (Test-Path $exe)) { throw "kestrel.exe was not produced" }
          $item = Get-Item $exe
          if ($item.Length -lt 500000) { throw "kestrel.exe is suspiciously small: $($item.Length) bytes" }
          $info = $item.VersionInfo
          Write-Host "size:    $($item.Length)"
          Write-Host "product: $($info.ProductName)"
          Write-Host "version: $($info.FileVersion)"
          if ($info.ProductName -ne "Kestrel") { throw "version resource missing or wrong product name" }

      - name: Build and run unit tests
        shell: cmd
        run: |
          set "PATH=${{ steps.msys2.outputs.msys2-location }}\${{ matrix.msystem }}\bin;%PATH%"
          cmake -B build-test -G "MinGW Makefiles" -DCMAKE_CXX_COMPILER=g++ -DCMAKE_C_COMPILER=gcc -DKESTREL_BUILD_TESTS=ON
          cmake --build build-test --target kestrel_tests -- -j8
          build-test\kestrel_tests.exe

      - name: Rebuild from clean must succeed
        shell: cmd
        run: |
          set "PATH=${{ steps.msys2.outputs.msys2-location }}\${{ matrix.msystem }}\bin;%PATH%"
          cmake --build build --config Release --target clean_all
          cmake -B build -G "MinGW Makefiles" -DCMAKE_CXX_COMPILER=g++ -DCMAKE_C_COMPILER=gcc -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j8

      - name: Code sign (DIST-01, only if a certificate secret is present)
        if: matrix.msystem == 'MINGW64' && env.SIGNING_CERT_PFX != ''
        shell: pwsh
        env:
          SIGNING_CERT_PFX: ${{ secrets.SIGNING_CERT_PFX }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", [Convert]::FromBase64String($env:SIGNING_CERT_PFX))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          & $signtool.FullName sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            /f "$env:RUNNER_TEMP\cert.pfx" /p $env:SIGNING_CERT_PASSWORD build/bin/kestrel.exe
          & $signtool.FullName verify /pa build/bin/kestrel.exe

      - name: Upload binary
        if: matrix.msystem == 'MINGW64'
        uses: actions/upload-artifact@v4
        with:
          name: kestrel-${{ github.sha }}
          path: build/bin/kestrel.exe
          if-no-files-found: error

  release:
    name: Release (on tag)
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: kestrel-${{ github.sha }}
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/kestrel.exe
          generate_release_notes: true

  warnings:
    name: Warnings are errors
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-cmake

      - name: Build with -Werror
        shell: cmd
        run: |
          set "PATH=${{ steps.msys2.outputs.msys2-location }}\MINGW64\bin;%PATH%"
          cmake -B build -G "MinGW Makefiles" -DCMAKE_CXX_COMPILER=g++ -DCMAKE_C_COMPILER=gcc -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wpedantic -Werror"
          cmake --build build --config Release -j8

  style:
    name: Project style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check style rules
        run: python tools/check_style.py .

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Check .clang-tidy exists
        run: test -f .clang-tidy && echo "clang-tidy config found"

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --inline-suppr \
            --std=c++20 \
            --language=c++ \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=unmatchedSuppression \
            -I include \
            src

  spelling:
    name: Spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: codespell-project/actions-codespell@v2
        with:
          skip: ./.git,./assets,*.ico,*.png
          ignore_words_list: currenty

  logo:
    name: Logo is reproducible
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: pip install pillow

      - name: Regenerate logo
        run: python tools/make_logo.py build-assets

      - name: Verify icon contains every required size
        run: |
          python - <<'EOF'
          from PIL import Image
          expected = {16, 24, 32, 48, 64, 128, 256}
          with Image.open("build-assets/kestrel.ico") as img:
              sizes = {s[0] for s in img.info["sizes"]}
          missing = expected - sizes
          if missing:
              raise SystemExit("icon is missing sizes: %s" % sorted(missing))
          print("icon sizes:", sorted(sizes))
          EOF

      - name: Committed assets must exist
        run: |
          for f in assets/kestrel.ico assets/logo.png assets/logo.svg; do
            test -f "$f" || { echo "missing $f"; exit 1; }
          done

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Local links in README must resolve
        run: |
          python - <<'EOF'
          import re, os, sys
          text = open("README.md", encoding="utf-8").read()
          targets = re.findall(r'\]\(([^)#]+)\)', text) + re.findall(r'src="([^"]+)"', text)
          missing = []
          for t in targets:
              if t.startswith(("http://", "https://", "mailto:")):
                  continue
              if not os.path.exists(t):
                  missing.append(t)
          if missing:
              print("unresolved local links:")
              for m in missing:
                  print(" ", m)
              sys.exit(1)
          print("all local README links resolve")
          EOF

      - name: README must not contain emoji
        run: |
          python - <<'EOF'
          import sys
          text = open("README.md", encoding="utf-8").read()
          bad = [c for c in text if ord(c) > 0x2100 and c not in "—–‘’“”"]
          if bad:
              print("non-ascii symbols found in README:", sorted(set(bad)))
              sys.exit(1)
          print("README is emoji free")
          EOF